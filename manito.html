<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마니또 미션 인증</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap');

  :root {
    --navy: #0f1f3d;
    --navy-mid: #1a3060;
    --green: #1a4a2e;
    --green-mid: #2e7d52;
    --white: #f4f7f4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px 60px;
    transition: background 0.8s ease;
  }

  body.submitted { background: #000; }

  #done-screen {
    display: none;
    text-align: center;
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .done-mark {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 2.5px solid var(--green-mid);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
  }

  .done-mark svg {
    width: 32px; height: 32px;
    stroke: var(--green-mid); stroke-width: 2.5;
    fill: none; stroke-linecap: round; stroke-linejoin: round;
  }

  .done-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 10px;
  }

  .done-sub { font-size: 13px; color: rgba(255,255,255,0.35); line-height: 1.8; font-weight: 300; }

  #form-section { width: 100%; max-width: 520px; }

  .form-header { text-align: center; margin-bottom: 32px; }

  .form-eyebrow {
    font-size: 10px; letter-spacing: 0.3em; color: var(--green-mid);
    text-transform: uppercase; font-weight: 500; margin-bottom: 14px;
  }

  .form-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px; font-weight: 700; color: #fff; line-height: 1.5; margin-bottom: 10px;
  }

  .form-desc { font-size: 13px; color: rgba(255,255,255,0.45); line-height: 1.8; font-weight: 300; }

  .card {
    background: var(--navy-mid);
    border-radius: 14px; border: 1px solid rgba(255,255,255,0.07);
    padding: 28px; margin-bottom: 12px;
  }

  .field-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
    color: rgba(255,255,255,0.45); text-transform: uppercase;
    margin-bottom: 10px; display: block;
  }

  .field-input {
    width: 100%; background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.1); border-radius: 8px;
    padding: 12px 16px; font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif; color: #fff;
    outline: none; transition: border-color 0.15s;
  }

  .field-input::placeholder { color: rgba(255,255,255,0.2); }
  .field-input:focus { border-color: var(--green-mid); }

  .upload-area {
    border: 1.5px dashed rgba(255,255,255,0.15); border-radius: 10px;
    padding: 32px 20px; text-align: center; cursor: pointer;
    transition: all 0.2s; position: relative; overflow: hidden;
  }

  .upload-area:hover { border-color: var(--green-mid); background: rgba(46,125,82,0.06); }
  .upload-area.has-image { border-color: var(--green-mid); border-style: solid; padding: 0; }

  .upload-area input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-icon { width: 36px; height: 36px; margin: 0 auto 10px; opacity: 0.35; }

  .upload-text { font-size: 13px; color: rgba(255,255,255,0.4); line-height: 1.7; font-weight: 300; }
  .upload-text strong { color: var(--green-mid); font-weight: 500; }

  #preview-img { display: none; width: 100%; border-radius: 8px; max-height: 280px; object-fit: cover; }

  .submit-btn {
    width: 100%; padding: 16px; background: var(--green); color: #fff;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
    letter-spacing: 0.05em; transition: background 0.15s, transform 0.1s; margin-top: 4px;
  }

  .submit-btn:hover { background: var(--green-mid); }
  .submit-btn:active { transform: scale(0.99); }

  .error-msg { font-size: 12px; color: #e07070; text-align: center; margin-top: 10px; display: none; }

  .spinner {
    display: none; width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.7s linear infinite; margin: 12px auto 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .form-title { font-size: 18px; }
    .card { padding: 20px 18px; }
  }
</style>
</head>
<body>

<div id="done-screen">
  <div class="done-mark">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div class="done-title">제출되었습니다!</div>
  <div class="done-sub">미션 수행 기록이 정상적으로 접수되었습니다.<br>\u314b\u314b\u314b\u314b\u0020\uc218\uace0\ud588\uc5b4\u0020\u314b\u314b\u314b\u314b</div>
</div>

<div id="form-section">
  <div class="form-header">
    <div class="form-eyebrow">세광공업고등학교 — 마니또</div>
    <div class="form-title">마니또를 수행하였나요?<br>미션을 성공한 학생은 아래에<br>사진을 첨부해 주세요!</div>
    <div class="form-desc">미제출 시 미참여로 간주합니다.</div>
  </div>

  <div class="card">
    <label class="field-label" for="nameInput">본인 이름</label>
    <input type="text" id="nameInput" class="field-input" placeholder="ex. ■■■">
  </div>

  <div class="card">
    <label class="field-label" for="guessInput">당신의 마니또는 누구일 것 같습니까?</label>
    <input type="text" id="guessInput" class="field-input" placeholder="ex. 학생주임인 것 같습니다">
  </div>

  <div class="card">
    <label class="field-label">미션 수행 인증 사진</label>
    <div class="upload-area" id="uploadArea">
      <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(event)">
      <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <div class="upload-text"><strong>사진을 선택</strong>하거나 여기에 끌어다 놓으세요<br><span style="font-size:11px;">JPG, PNG, HEIC 등</span></div>
      <img id="preview-img" alt="미리보기">
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitForm()">제출하기</button>
  <div class="spinner" id="spinner"></div>
  <div class="error-msg" id="errorMsg"></div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz-yLHzHHoIu7DUEwURnyZ8m5jaqtdjJ0FSJ6xSZn7yB01lBq7RNGFA7NveUek6Mzg36w/exec';

  function handlePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const img = document.getElementById('preview-img');
      img.src = ev.target.result;
      img.style.display = 'block';
      document.getElementById('uploadArea').classList.add('has-image');
    };
    reader.readAsDataURL(file);
  }

  const uploadArea = document.getElementById('uploadArea');
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = '#2e7d52'; });
  uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = ''; });
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      handlePhoto({ target: { files: [file] } });
    }
  });

  function resizeImage(dataUrl, maxWidth, callback) {
    const img = new Image();
    img.onload = function() {
      const ratio = Math.min(1, maxWidth / img.width);
      const canvas = document.createElement('canvas');
      canvas.width  = img.width  * ratio;
      canvas.height = img.height * ratio;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      callback(canvas.toDataURL('image/jpeg', 0.82));
    };
    img.src = dataUrl;
  }

  function showDone() {
    document.body.classList.add('submitted');
    setTimeout(() => {
      document.getElementById('form-section').style.display = 'none';
      document.getElementById('done-screen').style.display  = 'block';
    }, 500);
  }

  async function submitForm() {
    const name  = document.getElementById('nameInput').value.trim();
    const guess = document.getElementById('guessInput').value.trim();
    const photo = document.getElementById('preview-img').src;
    const errEl = document.getElementById('errorMsg');

    if (!name || !photo.startsWith('data:')) {
      errEl.textContent   = '이름과 사진을 모두 입력해 주세요.';
      errEl.style.display = 'block';
      setTimeout(() => errEl.style.display = 'none', 3000);
      return;
    }

    const btn     = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    btn.style.display     = 'none';
    spinner.style.display = 'block';
    errEl.style.display   = 'none';

    resizeImage(photo, 1200, async (resized) => {
      const payload = JSON.stringify({
        timestamp: new Date().toLocaleString('ko-KR'),
        name,
        guess,
        image: resized
      });

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: payload
        });
        showDone();
      } catch (err) {
        console.error(err);
        errEl.textContent   = '제출 중 오류가 발생했습니다. 다시 시도해 주세요.';
        errEl.style.display = 'block';
        btn.style.display     = 'block';
        spinner.style.display = 'none';
      }
    });
  }
</script>
</body>
</html>
